name: Stage — Validate & Hold

on:
  push:
    branches:
      - stage

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Validate JS syntax
        run: |
          echo "Checking api/ and lib/ files for syntax errors..."
          for f in api/*.js lib/*.js; do
            echo "Checking $f"
            node --check "$f"
          done
          echo "All files passed syntax check"

      - name: Summary
        run: |
          echo "✅ Stage validated. Vercel preview is deploying."
          echo "When ready to promote to prod, tell Claude: 'promote stage to prod'"
