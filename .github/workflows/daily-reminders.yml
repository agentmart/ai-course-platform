name: Daily Inactivity Reminders
on:
  schedule:
    - cron: '0 15 * * *'  # 3 PM UTC / 8 AM PT daily
  workflow_dispatch: {}

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Hit the Vercel deployment URL directly to bypass Cloudflare bot protection.
          # becomeaipm.com sits behind Cloudflare which challenges server-to-server requests.
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://ai-course-platform-git-main-stavanmehtas-projects.vercel.app/api/send-reminders" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: becomeaipm-cron/1.0")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Reminder job failed with status $http_code"
            exit 1
          fi
