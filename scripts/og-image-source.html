<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Fraunces:ital,wght@0,300;0,600;0,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;overflow:hidden;}
body{
  background:#1a1512;color:#f5f0e8;
  font-family:'DM Sans',sans-serif;
  position:relative;
}
body::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 85% 15%, rgba(200,89,10,.18), transparent 45%),
    radial-gradient(circle at 15% 85%, rgba(13,110,110,.14), transparent 50%);
}
.brand{
  position:absolute;left:80px;top:42px;
  font-family:'IBM Plex Mono',monospace;
  font-size:18px;letter-spacing:.22em;
  color:#c8590a;text-transform:lowercase;
}
.dot{
  position:absolute;right:80px;top:36px;
  display:inline-flex;align-items:center;gap:8px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;letter-spacing:.18em;
  color:rgba(245,240,232,.55);text-transform:uppercase;
  background:rgba(245,240,232,.06);
  border:1px solid rgba(245,240,232,.12);
  padding:8px 14px;border-radius:30px;
}
.dot::before{
  content:"";width:7px;height:7px;border-radius:50%;background:#4ade80;
  box-shadow:0 0 8px #4ade80;
}
.eyebrow{
  position:absolute;left:80px;top:130px;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;letter-spacing:.22em;
  color:#c8590a;text-transform:uppercase;
}
h1{
  position:absolute;left:80px;top:164px;
  font-family:'Fraunces',serif;
  font-size:74px;font-weight:900;
  line-height:1.02;letter-spacing:-.02em;
}
h1 em{color:#c8590a;font-style:italic;font-weight:300;}
.sub{
  position:absolute;left:80px;top:345px;right:80px;
  font-size:20px;
  color:rgba(245,240,232,.7);
  line-height:1.45;
}
.stats{
  position:absolute;left:80px;top:490px;
  display:flex;gap:42px;align-items:flex-start;
}
.stat-box{display:flex;flex-direction:column;align-items:flex-start;}
.stat-n{
  font-family:'Fraunces',serif;
  font-size:32px;font-weight:900;color:#c8590a;line-height:1;
}
.stat-l{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;letter-spacing:.18em;font-weight:500;
  color:#f5f0e8;text-transform:uppercase;
  margin-top:8px;
  display:block;
}
.url{
  position:absolute;left:990px;top:547px;
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;letter-spacing:.12em;
  color:#f5f0e8;
  white-space:nowrap;
  z-index:10;
}
.url em{color:#c8590a;font-style:normal;}
</style>
</head>
<body>
  <div class="brand">becomeaipm</div>
  <div class="dot" id="dot">100+ AI companies hiring</div>
  <div class="eyebrow" id="eyebrow">THE FREE 60-DAY COURSE FOR AI PRODUCT MANAGERS</div>
  <h1 id="title">Become an <em>AI</em> Product<br>Manager.</h1>
  <div class="sub" id="sub">A free, end-to-end curriculum: from prompt design and<br>evals to AI economics, agentic systems, and live job tracking.</div>
  <div class="stats" id="stats">
    <div class="stat-box"><div class="stat-n">60</div><div class="stat-l">Days</div></div>
    <div class="stat-box"><div class="stat-n">240+</div><div class="stat-l">Hours</div></div>
    <div class="stat-box"><div class="stat-n">15+</div><div class="stat-l">Projects</div></div>
    <div class="stat-box"><div class="stat-n">$0</div><div class="stat-l">Cost</div></div>
  </div>
  <script>
    // Parameterize via query string for per-page OG generation.
    // Example: ?eyebrow=AI+PM+JOBS&title=AI+PM+<em>Jobs</em>&sub=100%2B+companies.+Live.+Daily.&badge=Live+job+tracker&stats=100%2B|Companies,4|ATS+sources,Daily|Updated,Free|Access
    (function () {
      const q = new URLSearchParams(location.search);
      const set = (id, val) => { if (val != null && val !== '') document.getElementById(id).innerHTML = val; };
      set('eyebrow', q.get('eyebrow'));
      set('title', q.get('title'));
      set('sub', q.get('sub'));
      set('dot', q.get('badge'));
      const stats = q.get('stats');
      if (stats) {
        document.getElementById('stats').innerHTML = stats.split(',').map(pair => {
          const [n, l] = pair.split('|');
          return '<div class="stat-box"><div class="stat-n">' + (n || '') + '</div><div class="stat-l">' + (l || '') + '</div></div>';
        }).join('');
      }
    })();
  </script>
</body>
</html>
