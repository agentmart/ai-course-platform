name: Daily Feedback Summary

on:
  schedule:
    - cron: '0 14 * * *' # 9 AM ET / 6 AM PT daily
  workflow_dispatch: {}

permissions:
  issues: read
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent issues and generate summary
        uses: actions/github-script@v7
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        with:
          github-token: ${{ secrets.GH_PAT_TOKEN }}
          script: |
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

            // Fetch issues created in the last 24 hours
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: 'agentmart',
              repo: 'ai-course-platform',
              state: 'open',
              since,
              per_page: 50,
              sort: 'created',
              direction: 'desc',
            });

            const recentIssues = issues.filter(i => !i.pull_request && new Date(i.created_at) >= new Date(since));

            if (recentIssues.length === 0) {
              console.log('No new issues in the last 24 hours. Skipping summary.');
              return;
            }

            // Format issues for AI summary
            const issueList = recentIssues.map(i => ({
              number: i.number,
              title: i.title,
              labels: i.labels.map(l => l.name),
              body: (i.body || '').slice(0, 500),
              url: i.html_url,
            }));

            // Generate summary using GitHub Models API
            const summaryPrompt = `You are an AI assistant summarizing daily feedback for the becomeaipm.com platform.
            
            Here are the new issues from the last 24 hours:
            ${JSON.stringify(issueList, null, 2)}
            
            Generate a concise daily summary with:
            1. Total count of new issues by category (bug, feature, content)
            2. High-priority items that need immediate attention
            3. Brief 1-line summary for each issue
            4. Recommended action (approve for auto-fix, needs-discussion, or defer)
            
            Format as markdown. Be concise.`;

            try {
              const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.GITHUB_MODELS_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [{ role: 'user', content: summaryPrompt }],
                  max_tokens: 1500,
                }),
              });

              const data = await response.json();
              const summary = data.choices?.[0]?.message?.content || 'Summary generation failed.';

              // Create a summary issue
              const today = new Date().toISOString().split('T')[0];
              await github.rest.issues.create({
                owner: 'agentmart',
                repo: 'ai-course-platform',
                title: `[Daily Summary] ${today} — ${recentIssues.length} new issue${recentIssues.length === 1 ? '' : 's'}`,
                body: `# Daily Feedback Summary — ${today}\n\n${summary}\n\n---\n\n## Action Required\nLabel issues with \`approved\` to trigger the auto-fix developer agent.\n\n*Auto-generated by daily-feedback-summary workflow*`,
                labels: ['daily-summary'],
              });

              console.log(`Summary created for ${recentIssues.length} issues.`);
            } catch (err) {
              console.error('AI summary generation failed:', err);
              // Fallback: create a plain summary
              const plainSummary = recentIssues.map(i => `- #${i.number}: ${i.title} [${i.labels.map(l=>l.name).join(', ')}]`).join('\n');
              const today = new Date().toISOString().split('T')[0];
              await github.rest.issues.create({
                owner: 'agentmart',
                repo: 'ai-course-platform',
                title: `[Daily Summary] ${today} — ${recentIssues.length} new issue${recentIssues.length === 1 ? '' : 's'}`,
                body: `# Daily Feedback Summary — ${today}\n\n## New Issues\n${plainSummary}\n\n---\nLabel issues with \`approved\` to trigger auto-fix.\n\n*Auto-generated (AI summary unavailable)*`,
                labels: ['daily-summary'],
              });
            }
