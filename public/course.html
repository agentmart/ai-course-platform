<style>
:root{--bg:#f5f0e8;--ink:#1a1512;--ink2:#3d3530;--muted:#8c7f74;--border:#ccc4b8;--card:#faf7f2;--amber:#c8590a;--teal:#0d6e6e;--rule:#d4cdc4;}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;min-height:100vh;}
#loader{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .4s;}
#loader.gone{opacity:0;pointer-events:none;}
.ld-spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#c8590a;border-radius:50%;animation:spin .8s linear infinite;}
.ld-text{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.12em;}
.ld-err{color:#f87171;font-size:14px;text-align:center;max-width:400px;line-height:1.7;display:none;}
.ld-err a{color:#fca87a;text-decoration:underline;cursor:pointer;}
@keyframes spin{to{transform:rotate(360deg);}}
#topbar{background:var(--ink);padding:0 32px;display:flex;align-items:stretch;position:sticky;top:0;z-index:100;flex-shrink:0;}
.nav-logo{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#c8590a;letter-spacing:.15em;text-decoration:none;display:flex;align-items:center;padding:14px 0;margin-right:24px;white-space:nowrap;}
.nav-links{display:flex;align-items:stretch;gap:2px;flex:1;}
.nav-link{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);text-decoration:none;padding:0 14px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-link:hover{color:rgba(255,255,255,.8);border-bottom-color:rgba(255,255,255,.2);}
.nav-link.active{color:#c8590a;border-bottom-color:#c8590a;}
.nav-right{display:flex;align-items:center;gap:12px;padding:10px 0;margin-left:auto;}
.tb-day-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.3);}
.tb-streak{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:6px;}
.streak-fire{font-size:14px;}
.tb-avatar{width:28px;height:28px;border-radius:50%;background:#c8590a;color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.tb-signout{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);font-size:11px;padding:4px 10px;border-radius:2px;cursor:pointer;font-family:'IBM Plex Mono',monospace;}
.tb-signout:hover{border-color:#c8590a;color:#c8590a;}
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 57px);}
#sidebar{width:260px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sb-phases{padding:12px 0;}
.sb-phase-header{padding:10px 16px 6px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;border-top:1px solid var(--rule);margin-top:4px;}
.sb-phase-header:first-child{border-top:none;margin-top:0;}
.sb-day{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:background .1s;border-left:2px solid transparent;}
.sb-day:hover{background:rgba(200,89,10,.06);}
.sb-day.active{background:rgba(200,89,10,.1);border-left-color:#c8590a;}
.sb-day.done{opacity:.7;}
.sb-day-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);width:30px;flex-shrink:0;}
.sb-day.active .sb-day-num{color:#c8590a;}
.sb-day-title{font-size:12px;color:var(--ink2);line-height:1.3;flex:1;}
.sb-day.active .sb-day-title{color:var(--ink);font-weight:600;}
.sb-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.sb-day.done .sb-check{background:#c8590a;border-color:#c8590a;color:white;}
#content{flex:1;overflow-y:auto;padding:40px;}
.day-view{max-width:860px;margin:0 auto;}
.day-header{margin-bottom:32px;}
.day-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;}
.day-title{font-family:'Fraunces',serif;font-size:36px;font-weight:900;color:var(--ink);line-height:1.1;margin-bottom:10px;}
.day-subtitle{font-size:15px;color:var(--muted);}
.day-complete-btn{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 22px;background:var(--ink);color:white;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.day-complete-btn:hover{background:#c8590a;}
.day-complete-btn.done{background:#2d7a2d;pointer-events:none;}
.section{margin-bottom:32px;}
.section-title{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--rule);}
.context-body{font-size:15px;color:var(--ink2);line-height:1.75;}
.context-body p{margin-bottom:14px;}
.context-body strong{color:var(--ink);font-weight:600;}
.tasks{display:flex;flex-direction:column;gap:12px;}
.task{display:flex;gap:14px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:6px;transition:border-color .15s;}
.task.done{opacity:.65;}
.task-check{width:22px;height:22px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;}
.task-check:hover{border-color:#c8590a;}
.task.done .task-check{background:#c8590a;border-color:#c8590a;color:white;}
.task-body{flex:1;}
.task-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.task-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.task-desc{font-size:13px;color:var(--muted);line-height:1.6;}
.task-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);margin-top:6px;}
.interview-card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.ic-q{padding:16px 20px;border-bottom:1px solid var(--rule);font-size:15px;font-weight:600;color:var(--ink);}
.ic-toggle{padding:12px 20px;background:none;border:none;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);letter-spacing:.1em;cursor:pointer;text-align:left;width:100%;}
.ic-toggle:hover{background:rgba(200,89,10,.04);}
.ic-answer{padding:0 20px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s;font-size:14px;color:var(--ink2);line-height:1.7;}
.ic-answer.open{max-height:800px;padding:16px 20px;}
.resources{display:flex;flex-direction:column;gap:8px;}
.resource{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:4px;}
.resource-type{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;background:rgba(200,89,10,.1);color:#c8590a;letter-spacing:.1em;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.resource-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.resource-note{font-size:12px;color:var(--muted);}
.resource a{color:#0d6e6e;text-decoration:none;}
.resource a:hover{text-decoration:underline;}
.pm-card{background:linear-gradient(135deg,rgba(13,110,110,.08),rgba(200,89,10,.05));border:1px solid var(--border);border-radius:6px;padding:20px 24px;}
.pm-card p{font-size:14px;color:var(--ink2);line-height:1.7;}
.code-block{margin:20px 0;}
.code-block-title{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.editor{background:var(--ink);border-radius:8px;overflow:hidden;}
.e-bar{background:rgba(255,255,255,.04);padding:9px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);}
.e-dot{width:11px;height:11px;border-radius:50%;}
.e-r{background:#ff5f57;}.e-y{background:#ffbd2e;}.e-g{background:#28c840;}
.e-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.2);margin-left:auto;}
.e-ta{width:100%;background:transparent;border:none;outline:none;color:#d4c5b0;font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.7;resize:vertical;min-height:100px;padding:14px 18px;}
.e-foot{padding:8px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.e-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);padding:5px 8px;border-radius:3px;font-size:11px;font-family:'IBM Plex Mono',monospace;}
.e-run{background:#c8590a;color:white;border:none;padding:7px 18px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.e-spin{width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.e-spin.on{display:inline-block;}
.e-out{background:rgba(0,0,0,.4);border-top:1px solid rgba(255,255,255,.05);padding:12px 18px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#90b878;min-height:44px;white-space:pre-wrap;word-break:break-all;}
.e-out.err{color:#f87171;}
.e-status{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.18);padding:4px 14px;text-align:right;}
.notes-area{width:100%;min-height:120px;border:1px solid var(--border);border-radius:4px;padding:14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--card);resize:vertical;outline:none;line-height:1.6;}
.notes-area:focus{border-color:#c8590a;}
.notes-save{margin-top:8px;padding:8px 18px;background:var(--ink);color:white;border:none;border-radius:3px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.notes-save:hover{background:#c8590a;}
.notes-saved{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4ade80;margin-left:10px;opacity:0;transition:opacity .3s;}
.notes-saved.show{opacity:1;}
.progress-bar-wrap{height:3px;background:rgba(255,255,255,.08);margin-top:1px;}
.progress-bar-fill{height:3px;background:#c8590a;transition:width .4s ease;}
@media(max-width:768px){#sidebar{display:none;}#content{padding:20px;}}

.share-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:36px;max-width:420px;width:90%;text-align:center;}
.share-emoji{font-size:48px;margin-bottom:12px;}

.share-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.share-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;text-decoration:none;color:white;}
.share-btn.linkedin{background:#0077B5;}
.share-btn.linkedin:hover{background:#005e93;}
.share-btn.xcom{background:#1a1512;}
.share-btn.xcom:hover{background:var(--amber);}
.share-btn.copy{background:var(--card);color:var(--ink);border:1px solid var(--border);}
.share-btn.copy:hover{border-color:var(--amber);color:var(--amber);}
.share-skip{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:8px;}
.share-skip:hover{color:var(--amber);}
.share-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:10px 20px;border-radius:4px;font-size:13px;font-family:'IBM Plex Mono',monospace;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1001;}
.share-toast.show{opacity:1;}

(async function boot(){
  try{ const r=await fetch('/api/config'); cfg=await r.json(); }
  catch(e){ showLdErr('Could not reach /api/config.'); return; }
  if(!cfg.clerkPublishableKey||!cfg.clerkDomain){
    showLdErr('Auth keys not configured. Add NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY and CLERK_DOMAIN in Vercel env vars.');
    return;
  }
  const s=document.createElement('script');
  s.src=`https://${cfg.clerkDomain}/npm/@clerk/clerk-js@latest/dist/clerk.browser.js`;
  s.setAttribute('data-clerk-publishable-key',cfg.clerkPublishableKey);
  s.crossOrigin='anonymous';
  document.head.appendChild(s);
  s.onerror=()=>showLdErr('Failed to load auth. Check CLERK_DOMAIN env var.');
  s.onload=async()=>{
    try{ clerk=window.Clerk; await clerk.load(); }
    catch(e){ showLdErr('Auth init failed: '+e.message); return; }
    if(!clerk.user){ hideLoader(); window.location.href='/'; return; }
    setLdText('LOADING PROGRESS...');
    await loadProgress();
    renderNav(); renderSidebar(); renderDay(currentDay);
    document.getElementById('topbar').style.display='flex';
    document.getElementById('pb-wrap').style.display='block';
    document.getElementById('app').style.display='flex';
    updateProgress(); hideLoader();
    initPendo(cfg.pendoApiKey, clerk.user);
  };
})();

function hideLoader(){ const l=document.getElementById('loader'); l.classList.add('gone'); setTimeout(()=>l.style.display='none',500); }
function showLdErr(html){ document.querySelector('.ld-spin').style.display='none'; document.querySelector('.ld-text').style.display='none'; const el=document.getElementById('ld-err'); el.innerHTML=html; el.style.display='block'; }
function setLdText(t){ document.querySelector('.ld-text').textContent=t; }

async function loadProgress(){
  try{
    const token=await clerk.session.getToken();
    const r=await fetch('/api/progress',{headers:{'Authorization':'Bearer '+token}});
    if(r.ok){
      const d=await r.json();
      completed=new Set(d.completed||[]); taskStates=d.taskStates||{}; notes=d.notes||{};
      const lastDone=Math.max(0,...[...completed]);
      currentDay=Math.min(60,lastDone+1)||1;
    }
  }catch(e){}
}

async function saveProgress(){
  try{
    const token=await clerk.session.getToken();
    await fetch('/api/progress',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({completed:[...completed],taskStates,notes})});
  }catch(e){}
}

function renderNav(){
  const user=clerk.user;
  const init=(user.firstName?.[0]||user.emailAddresses?.[0]?.emailAddress?.[0]||'?').toUpperCase();
  document.getElementById('tb-avatar').textContent=init;
  updateStreak();
}
function updateStreak(){ const s=completed.size; document.getElementById('tb-streak').textContent=s+' day'+(s===1?'':'s')+' done'; }
async function doSignOut(){ await clerk.signOut(); window.location.href='/'; }

function renderSidebar(){
  const container=document.getElementById('sb-phases'); container.innerHTML='';
  for(const phase of PHASES){
    const header=document.createElement('div'); header.className='sb-phase-header'; header.textContent=phase.label; container.appendChild(header);
    for(let d=phase.days[0];d<=phase.days[1];d++){
      const el=document.createElement('div');
      el.className='sb-day'+(completed.has(d)?' done':'')+(d===currentDay?' active':'');
      el.dataset.day=d;
      el.innerHTML=`<div class="sb-day-num">D${String(d).padStart(2,'0')}</div><div class="sb-day-title">${DAY_TITLES[d]||'Day '+d}</div><div class="sb-check">${completed.has(d)?'&#10003;':''}</div>`;
      el.addEventListener('click',()=>{ currentDay=d; renderDay(d); syncSidebar(); });
      container.appendChild(el);
    }
  }
}

function syncSidebar(){
  document.querySelectorAll('.sb-day').forEach(el=>{
    const d=Number(el.dataset.day);
    el.className='sb-day'+(completed.has(d)?' done':'')+(d===currentDay?' active':'');
    el.querySelector('.sb-check').innerHTML=completed.has(d)?'&#10003;':'';
  });
  updateProgress(); updateStreak();
  document.getElementById('tb-day-label').textContent='Day '+currentDay;
}

function updateProgress(){ const pct=Math.round((completed.size/60)*100); document.getElementById('pb-fill').style.width=pct+'%'; }

function renderDay(day){
  document.getElementById('tb-day-label').textContent='Day '+day;
  const data=getDayData(day); const isDone=completed.has(day);
  const view=document.getElementById('day-view');
  view.innerHTML=`
    <div class="day-header">
      <div class="day-meta">Day ${day} of 60 &middot; ${data.phase}</div>
      <div class="day-title">${data.title}</div>
      <div class="day-subtitle">${data.subtitle}</div>
      <button class="day-complete-btn ${isDone?'done':''}" id="complete-btn" onclick="markDayComplete(${day})">${isDone?'&#10003; Day Completed':'Mark Day Complete'}</button>
    </div>
    <div class="section"><div class="section-title">Context &amp; Concepts</div><div class="context-body">${data.context}</div></div>
    <div class="section"><div class="section-title">Today&#39;s Tasks</div><div class="tasks" id="tasks-container">${data.tasks.map((t,i)=>renderTask(day,i,t)).join('')}</div></div>
    ${data.codeExample?`<div class="section"><div class="section-title">Hands-On Code</div>${renderCodeBlock(day,data.codeExample)}</div>`:''}
    <div class="section"><div class="section-title">Interview Preparation</div><div class="interview-card"><div class="ic-q">Q: ${data.interview.question}</div><button class="ic-toggle" onclick="toggleAnswer(this)">&#9658; SHOW MODEL ANSWER</button><div class="ic-answer">${data.interview.answer}</div></div></div>
    <div class="section"><div class="section-title">PM Leadership Angle</div><div class="pm-card"><p>${data.pmAngle}</p></div></div>
    <div class="section"><div class="section-title">Resources</div><div class="resources">${data.resources.map(r=>`<div class="resource"><div class="resource-type">${r.type}</div><div><div class="resource-title"><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a></div><div class="resource-note">${r.note}</div></div></div>`).join('')}</div></div>
    <div class="section"><div class="section-title">Your Notes</div><textarea class="notes-area" id="notes-area" placeholder="Your notes for Day ${day}...">${notes['day'+day]||''}</textarea><button class="notes-save" onclick="saveNote(${day})">Save Note</button><span class="notes-saved" id="notes-saved">Saved &#10003;</span></div>
  `;
  document.getElementById('content').scrollTo({top:0,behavior:'smooth'});
}

function renderTask(day,i,task){
  const key=`day${day}_task${i}`; const done=taskStates[key]||false;
  return `<div class="task ${done?'done':''}" id="task-${day}-${i}"><div class="task-check" onclick="toggleTask(${day},${i})">${done?'&#10003;':''}</div><div class="task-body"><div class="task-label">Task ${i+1}</div><div class="task-title">${task.title}</div><div class="task-desc">${task.description}</div><div class="task-time">&#9203; ${task.time}</div></div></div>`;
}

function renderCodeBlock(day,ex){
  const id=`editor-${day}`;
  return `<div class="code-block"><div class="code-block-title">${ex.title||'Code Exercise'}</div><div class="editor"><div class="e-bar"><div class="e-dot e-r"></div><div class="e-dot e-y"></div><div class="e-dot e-g"></div><div class="e-badge" id="${id}-badge">${ex.lang==='python'?'PYTHON &middot; WASM':'JAVASCRIPT &middot; SANDBOX'}</div></div><textarea class="e-ta" id="${id}-code" spellcheck="false">${ex.code}</textarea><div class="e-foot"><select class="e-sel" id="${id}-lang" onchange="onEditorLangChange('${id}')"><option value="python" ${ex.lang==='python'?'selected':''}>Python (Pyodide WASM)</option><option value="js" ${ex.lang==='js'?'selected':''}>JavaScript (sandbox)</option></select><button class="e-run" onclick="runEditor('${id}')"><span class="e-spin" id="${id}-spin"></span>&#9654; Run</button></div><div class="e-out" id="${id}-out">// Press Run</div><div class="e-status" id="${id}-status">${ex.lang==='python'?'Pyodide: not loaded':''}</div></div></div>`;
}

function onEditorLangChange(id){ document.getElementById(id+'-badge').innerHTML=document.getElementById(id+'-lang').value==='python'?'PYTHON &middot; WASM':'JAVASCRIPT &middot; SANDBOX'; }
function toggleAnswer(btn){ const ans=btn.nextElementSibling; const open=ans.classList.toggle('open'); btn.textContent=(open?'&#9660; HIDE':'&#9658; SHOW')+' MODEL ANSWER'; }

function toggleTask(day,i){
  const key=`day${day}_task${i}`; taskStates[key]=!taskStates[key];
  const el=document.getElementById(`task-${day}-${i}`);
  if(el){ el.className='task '+(taskStates[key]?'done':''); el.querySelector('.task-check').innerHTML=taskStates[key]?'&#10003;':''; }
  saveProgress();
}

function markDayComplete(day){
  completed.add(day);
  if(window.pendo && pendo.track) pendo.track('Day Completed', {day: day});
  const btn=document.getElementById('complete-btn');
  if(btn){ btn.innerHTML='&#10003; Day Completed'; btn.className='day-complete-btn done'; }
  syncSidebar(); saveProgress();
  showShareModal(day);
  if(day<60){ setTimeout(()=>{ currentDay=day+1; renderDay(day+1); syncSidebar(); },1200); }
}

var shareDay = 1;
function showShareModal(day) {
  shareDay = day;
  document.getElementById('share-title').textContent = 'Day ' + day + ' Complete!';
  var text = 'I just completed Day ' + day + '/60 of Become AI PM! #BecomeAIPM';
  var url = 'https://becomeaipm.com/course.html';
  document.getElementById('share-linkedin').href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(url);
  document.getElementById('share-xcom').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url);
  document.getElementById('share-overlay').classList.add('open');
}
function closeShareModal() {
  document.getElementById('share-overlay').classList.remove('open');
}
function trackShare(platform) {
  if (window.pendo && pendo.track) pendo.track('Day Share', { day: shareDay, platform: platform });
}
function copyShareText() {
  var text = 'I just completed Day ' + shareDay + '/60 of Become AI PM! \uD83D\uDE80 #BecomeAIPM\nhttps://becomeaipm.com/course.html';
  navigator.clipboard.writeText(text).then(function() {
    var toast = document.getElementById('share-toast');
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2500);
  });
  trackShare('Instagram');
}

function saveNote(day){
  const area=document.getElementById('notes-area');
  if(area){ notes['day'+day]=area.value; }
  const saved=document.getElementById('notes-saved');
  if(saved){ saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'),2000); }
  saveProgress();
}

async function runEditor(id){
  const lang=document.getElementById(id+'-lang').value;
  const code=document.getElementById(id+'-code').value;
  const out=document.getElementById(id+'-out');
  const spin=document.getElementById(id+'-spin');
  spin.classList.add('on');
  if(lang==='python'){ await runPython(code,out,id+'-status'); } else { runJS(code,out); }
  spin.classList.remove('on');
}

async function runPython(code,outEl,statusId){
  const statusEl=statusId?document.getElementById(statusId):null;
  const setStatus=t=>{ if(statusEl)statusEl.textContent=t; };
  try{
    if(!pyodide&&!pyLoading){
      pyLoading=true; outEl.textContent='Loading Pyodide WebAssembly (~10MB, one-time)...'; setStatus('Pyodide: downloading...');
      const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js'; document.head.appendChild(s);
      await new Promise((res,rej)=>{ s.onload=res; s.onerror=()=>rej(new Error('CDN unreachable')); });
      pyodide=await window.loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/'});
      setStatus('Pyodide: ready &#10003;'); pyLoading=false;
    } else if(pyLoading){ outEl.textContent='Python runtime still loading...'; return; }
    let buf='';
    pyodide.setStdout({batched:s=>buf+=s+'\n'});
    pyodide.setStderr({batched:s=>buf+='&#9888; '+s+'\n'});
    await pyodide.runPythonAsync(code);
    outEl.textContent=buf.trimEnd()||'(no output)'; outEl.className='e-out';
  }catch(e){ outEl.textContent=String(e); outEl.className='e-out err'; setStatus('Pyodide: error'); pyLoading=false; }
}

function runJS(code,outEl){
  const iframe=document.createElement('iframe'); iframe.style.display='none'; iframe.sandbox='allow-scripts'; document.body.appendChild(iframe);
  const logs=[],w=iframe.contentWindow;
  w.console={log:(...a)=>logs.push(a.map(x=>typeof x==='object'?JSON.stringify(x,null,2):String(x)).join(' ')),error:(...a)=>logs.push('&#9888; '+a.map(String).join(' ')),warn:(...a)=>logs.push('&#9888; '+a.map(String).join(' ')),table:(...a)=>logs.push(JSON.stringify(a,null,2))};
  try{ w.eval(code); outEl.textContent=logs.join('\n')||'(no output)'; outEl.className='e-out'; }
  catch(e){ outEl.textContent=e.toString(); outEl.className='e-out err'; }
  finally{ document.body.removeChild(iframe); }
}

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
    const active=document.activeElement;
    if(active&&active.classList.contains('e-ta')){ e.preventDefault(); runEditor(active.id.replace('-code','')); }
  }
});

function getDayData(day){
  const defaults={
    phase: day<=20?'Phase 1 — Foundations':day<=40?'Phase 2 — Protocols & Frameworks':'Phase 3 — Leadership & Ship',
    title: DAY_TITLES[day]||'Day '+day,
    subtitle: 'Master the tools, protocols, and frameworks used at frontier AI labs.',
    context: '<p>Lesson content loading. If this persists, please refresh the page.</p>',
    tasks:[
      {title:'Read the lesson',description:"Study today's context and concepts carefully.",time:'30 min'},
      {title:'Complete the hands-on exercise',description:'Apply the concept with the code runner below.',time:'25 min'},
      {title:'Answer the interview question',description:'Write your answer before revealing the model answer.',time:'20 min'},
      {title:'Review resources',description:'Skim the pre-selected docs and flag what to revisit.',time:'15 min'},
    ],
    interview:{question:"How would you explain today's topic to a non-technical PM?",answer:'Structure your answer with: (1) the problem this solves, (2) how it works at a high level, (3) why it matters for product decisions, and (4) a concrete example from a product you know.'},
    pmAngle:'Every technical topic in this course has a product decision attached to it. Your job as an AI PM is to understand the tradeoffs well enough to make build/buy/partner calls and communicate them credibly.',
    resources:[
      {type:'DOCS',title:'Anthropic Documentation',url:'https://docs.anthropic.com',note:'Primary reference for all Claude API and safety concepts.'},
      {type:'DOCS',title:'OpenAI Documentation',url:'https://platform.openai.com/docs',note:'Primary reference for GPT and Assistants API.'},
    ],
  };
  const overrides=getDayOverride(day);
  return {...defaults,...overrides};
}

function getDayOverride(day){
  if(window.COURSE_DAY_DATA && window.COURSE_DAY_DATA[day]){
    return window.COURSE_DAY_DATA[day];
  }
  return {};
}
