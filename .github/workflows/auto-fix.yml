name: Auto-Fix Developer Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Single issue number (approved + content-freshness). Leave blank if using issue_numbers.'
        required: false
        type: string
      issue_numbers:
        description: 'Comma-separated issue numbers for a batched cluster run.'
        required: false
        type: string
      cluster_label:
        description: 'Optional cluster label (used in PR body).'
        required: false
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write
  models: read

jobs:
  auto-fix:
    # Run if: (label add of 'approved') OR (manual dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.label.name == 'approved') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Classify issue
        id: classify
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_TOKEN }}
          script: |
            // Determine mode: batch (issue_numbers) vs single (issue_number or label event)
            const inputs = (context.payload.inputs) || {};
            const batchRaw = (inputs.issue_numbers || '').trim();
            if (batchRaw) {
              core.setOutput('mode', 'batch');
              core.setOutput('issue_numbers', batchRaw);
              core.setOutput('cluster_label', (inputs.cluster_label || '').trim());
              core.setOutput('is_freshness', 'true');
              core.setOutput('issue_number', '');
              return;
            }
            let issueNumber, labels;
            if (context.eventName === 'workflow_dispatch') {
              issueNumber = parseInt(inputs.issue_number, 10);
              if (!issueNumber) {
                core.setFailed('workflow_dispatch needs either issue_number or issue_numbers');
                return;
              }
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
              });
              labels = (issue.labels || []).map(l => l.name);
            } else {
              issueNumber = context.payload.issue.number;
              labels = (context.payload.issue.labels || []).map(l => l.name);
            }
            core.setOutput('mode', 'single');
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('issue_numbers', '');
            core.setOutput('is_freshness', labels.includes('content-freshness') ? 'true' : 'false');

      # ─────────────────────────────────────────────
      # Path A: content-freshness issues → dedicated content-aware script
      # ─────────────────────────────────────────────
      - name: Freshness Auto-Fix (single)
        if: steps.classify.outputs.is_freshness == 'true' && steps.classify.outputs.mode == 'single'
        env:
          ISSUE_NUMBER:              ${{ steps.classify.outputs.issue_number }}
          GH_TOKEN:                  ${{ secrets.GH_PAT_TOKEN }}
          GH_MODELS_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:         ${{ github.repository }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/freshness-auto-fix.mjs

      - name: Freshness Auto-Fix (batch)
        if: steps.classify.outputs.mode == 'batch'
        env:
          ISSUE_NUMBERS:             ${{ steps.classify.outputs.issue_numbers }}
          CLUSTER_LABEL:             ${{ steps.classify.outputs.cluster_label }}
          GH_TOKEN:                  ${{ secrets.GH_PAT_TOKEN }}
          GH_MODELS_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:         ${{ github.repository }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/freshness-auto-fix-batch.mjs

      # ─────────────────────────────────────────────
      # Path B: generic developer-agent for non-freshness issues (legacy)
      # ─────────────────────────────────────────────
      - name: Generic Developer Agent
        if: steps.classify.outputs.is_freshness != 'true' && steps.classify.outputs.mode == 'single'
        uses: actions/github-script@v7
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GH_PAT_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueBody = issue.body || '';
            const issueTitle = issue.title || '';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '🤖 **Developer Agent**: Analyzing this issue and attempting an automated fix...',
            });

            const analyzePrompt = `You are an expert developer working on becomeaipm.com — a static HTML/CSS/JS frontend with Vercel serverless API functions and Supabase.

            Architecture:
            - Frontend: public/*.html (vanilla JS, no framework)
            - API: api/*.js (Vercel serverless functions)
            - Course content: public/days/day-NN.js
            - Auth: lib/clerk.js (Clerk JWT)

            Issue #${issueNumber}: ${issueTitle}

            ${issueBody}

            Analyze this issue and provide:
            1. Which files likely need changes (exact paths)
            2. What the fix should be (specific code changes)
            3. Risk assessment (low/medium/high)

            Respond in JSON format:
            {
              "files": ["path/to/file.js"],
              "summary": "Brief description of the fix",
              "risk": "low|medium|high",
              "canAutoFix": true|false,
              "reason": "Why it can or cannot be auto-fixed"
            }

            Only set canAutoFix=true for low-risk changes like typo fixes, content updates, CSS tweaks, or simple bug fixes in non-auth code.`;

            try {
              const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.GITHUB_MODELS_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [{ role: 'user', content: analyzePrompt }],
                  max_tokens: 1000,
                  response_format: { type: 'json_object' },
                }),
              });

              const data = await response.json();
              const content = data.choices?.[0]?.message?.content || '{}';
              const analysis = JSON.parse(content);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `### 🔍 Analysis\n\n**Files involved:** ${(analysis.files || []).map(f => '`' + f + '`').join(', ') || 'Unknown'}\n**Summary:** ${analysis.summary || 'No summary'}\n**Risk:** ${analysis.risk || 'unknown'}\n**Auto-fixable:** ${analysis.canAutoFix ? 'Yes' : 'No'}\n${analysis.reason ? `**Reason:** ${analysis.reason}` : ''}\n\n---\n${analysis.canAutoFix ? '✅ This issue appears safe for auto-fix. A PR will be created if the developer agent can generate a fix.' : '⚠️ This issue requires manual review. Assigning for human attention.'}`,
              });

              if (!analysis.canAutoFix || analysis.risk === 'high') {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['needs-human-review'],
                });
                return;
              }

              const branchName = `auto-fix/issue-${issueNumber}`;
              const baseSha = (await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
              })).data.object.sha;

              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: baseSha,
              });

              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Auto-Fix] ${issueTitle}`,
                body: `Closes #${issueNumber}\n\n## Analysis\n${analysis.summary}\n\n**Files:** ${(analysis.files || []).join(', ')}\n**Risk:** ${analysis.risk}\n\n---\n*Auto-generated by developer agent. Needs QA validation before merge.*`,
                head: branchName,
                base: 'main',
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.data.number,
                labels: ['needs-qa', 'auto-fix'],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ Created PR #${pr.data.number} for this fix. QA agent will validate before merge.`,
              });

            } catch (err) {
              console.error('Developer agent error:', err);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ **Developer Agent**: Auto-fix failed. Error: ${err.message}\n\nThis issue needs manual attention.`,
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['needs-human-review'],
              });
            }
