name: Daily Jobs Status Check

on:
  schedule:
    # Every day at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      - name: Install Playwright stealth + Chromium
        # Installed directly in CI — not in package.json to keep lock file clean.
        # playwright-extra + stealth plugin bypass Cloudflare bot detection on Ashby.
        run: |
          npm install playwright-extra playwright-extra-plugin-stealth playwright
          npx playwright install chromium --with-deps

      - name: Run daily jobs checker
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/daily-jobs-check.mjs
